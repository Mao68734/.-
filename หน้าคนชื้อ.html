<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">COKE-STORE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Chakra Petch', sans-serif; transition: background-color 0.3s ease; }
    </style>
</head>
<body id="shop-body" class="text-slate-200 min-h-screen flex flex-col justify-between bg-[#05070c]">

    <header class="border-b bg-slate-950/40 backdrop-blur border-slate-900 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center relative">
            
            <div class="flex items-center gap-3 cursor-pointer" onclick="showCategoriesView()">
                <div id="shop-logo-zone" class="w-10 h-10 rounded-xl overflow-hidden flex items-center justify-center bg-cyan-600 text-white shadow-lg">
                    <i id="shop-logo-icon" class="fa-solid fa-fire text-lg"></i>
                </div>
                <h1 id="shop-name" class="text-xl font-black text-white tracking-wider uppercase">COKE-STORE</h1>
            </div>

            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-900 hover:bg-slate-200 transition cursor-pointer shadow-md">
                    <i class="fa-regular fa-user text-lg"></i>
                </button>

                <div id="user-menu-dropdown" class="absolute right-0 mt-3 w-72 rounded-2xl p-5 shadow-2xl z-50 hidden border-2 border-slate-800 bg-slate-950">
                    <div class="flex items-center gap-3 mb-5">
                        <div class="w-12 h-12 rounded-xl overflow-hidden border border-slate-700">
                            <img id="user-avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <h4 id="user-display-name" class="text-white font-bold text-base tracking-wide truncate max-w-[170px]">Mao_01</h4>
                            <p class="text-emerald-400 font-semibold text-sm mt-0.5">฿ <span id="user-display-money">0.00</span> บาท</p>
                        </div>
                    </div>

                    <ul class="space-y-3 text-slate-300 text-xs mb-5">
                        <li onclick="openSubMenu('setting')" class="flex items-center gap-3 hover:text-white cursor-pointer bg-slate-900/50 p-2 rounded-xl border border-slate-900">
                            <i class="fa-solid fa-gear text-slate-400 text-sm"></i> <span>การตั้งค่าบัญชี</span>
                        </li>
                        <li onclick="openSubMenu('refill')" class="flex items-center gap-3 hover:text-white cursor-pointer bg-slate-900/50 p-2 rounded-xl border border-slate-900">
                            <i class="fa-solid fa-dollar-sign text-slate-400 text-sm w-4 text-center"></i> <span>ประวัติเติมเงิน</span>
                        </li>
                        <li onclick="openSubMenu('history')" class="flex items-center gap-3 hover:text-white cursor-pointer bg-slate-900/50 p-2 rounded-xl border border-slate-900">
                            <i class="fa-solid fa-basket-shopping text-slate-400 text-sm"></i> <span>ประวัติการสั่งซื้อ</span>
                        </li>
                    </ul>

                    <button onclick="alert('ออกจากระบบสำเร็จ')" class="w-full bg-rose-600 hover:bg-rose-500 text-white py-2 rounded-xl text-xs font-bold transition flex items-center justify-center gap-2 cursor-pointer shadow">
                        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
                    </button>
                </div>
            </div>

        </div>
    </header>

    <main class="max-w-2xl w-full mx-auto px-4 py-6 flex-1">
        
        <div id="back-btn-container" class="mb-6 hidden">
            <button onclick="showCategoriesView()" type="button" class="bg-white text-center inline-flex items-center justify-center rounded-xl h-10 relative text-black text-xs font-bold border-2 border-white group cursor-pointer overflow-hidden shadow-lg pl-12 pr-4 transition-all duration-300">
                <div class="bg-emerald-500 rounded-lg h-8 w-8 grid place-items-center absolute left-1 top-0.5 group-hover:w-[96%] z-10 duration-500 transition-all">
                    <svg width="16px" height="16px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#000000" d="M224 480h640a32 32 0 1 1 0 64H224a32 32 0 0 1 0-64z"></path>
                        <path fill="#000000" d="m237.248 512 265.408 265.344a32 32 0 0 1-45.312 45.312l-288-288a32 32 0 0 1 0-45.312l288-288a32 32 0 1 1 45.312 45.312L237.248 512z"></path>
                    </svg>
                </div>
                <p class="text-slate-900 group-hover:text-black font-bold tracking-wide relative z-20 duration-300 transition-colors">
                    กลับไปหน้าหมวดหมู่เกม
                </p>
            </button>
        </div>

        <div id="categories-view" class="space-y-4"></div>

        <div id="products-view" class="grid grid-cols-2 gap-4 hidden"></div>
    </main>

    <div id="sub-menu-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden p-4 backdrop-blur-sm">
        <div id="sub-modal-content-box" class="w-full max-w-sm rounded-2xl p-5 border border-slate-800 bg-slate-950">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
                <h3 id="sub-modal-title" class="font-bold text-white text-sm">เมนูระบบ</h3>
                <button onclick="closeSubMenu()" class="text-slate-400 hover:text-white text-lg cursor-pointer">&times;</button>
            </div>
            
            <div id="sub-modal-body" class="text-xs text-slate-300"></div>
        </div>
    </div>

    <div id="pay-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-900 w-full max-w-sm rounded-2xl border border-slate-800 p-5">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
                <h3 class="font-bold text-white text-xs"><i class="fa-solid fa-wallet text-amber-400 mr-1"></i> ยืนยันชำระเงิน</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-lg cursor-pointer">&times;</button>
            </div>
            <div id="modal-summary" class="text-xs text-slate-300 bg-slate-950 p-3 rounded-lg mb-4 space-y-1"></div>
            <form onsubmit="executePurchase(event)" class="space-y-3">
                <input type="url" id="angpao-link" required placeholder="วางลิงก์ซองของขวัญวอลเล็ทที่นี่..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white focus:outline-none">
                <button type="submit" class="w-full bg-emerald-500 text-slate-950 py-2 rounded-xl text-xs font-bold hover:bg-emerald-400 transition cursor-pointer">จ่ายซองและรับรหัสทันที</button>
            </form>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-900 w-full max-w-sm rounded-2xl border border-emerald-500/30 p-5 text-center">
            <h3 class="font-bold text-emerald-400 mb-2 text-sm">🎉 สำเร็จ! ได้รับข้อมูลสินค้าแล้ว</h3>
            <div id="delivery-box" class="bg-slate-950 p-4 rounded-xl text-left font-mono text-slate-300 text-xs whitespace-pre-line border border-slate-850 mb-4 select-all"></div>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-2 rounded-xl text-xs cursor-pointer">เสร็จสิ้น</button>
        </div>
    </div>

    <footer class="py-4 text-center text-[10px] text-slate-600 border-t border-slate-950/40">
        &copy; 2026 <span id="shop-footer-text" class="font-medium">COKE-STORE</span>. All Rights Reserved.
    </footer>

    <script>
        let userProfile = JSON.parse(localStorage.getItem('user_profile')) || { name: "Mao_01", avatar: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150", money: 0.00 };
        let refillHistory = JSON.parse(localStorage.getItem('user_refill_log')) || [ { date: "2026-06-01 14:20", amount: 150, status: "สำเร็จ" }, { date: "2026-06-05 09:12", amount: 50, status: "สำเร็จ" } ];
        let purchaseHistory = JSON.parse(localStorage.getItem('user_purchase_log')) || [ { date: "2026-06-02 18:01", item: "สุ่มรหัสเกลือ การีน่า", price: 0.50 } ];

        let categories = [];
        let allProducts = [];
        let currentActiveProductId = null;

        window.onload = function() {
            loadShopSettings();
            renderCategories();
            updateUserUIDisplay();
        };

        function loadShopSettings() {
            categories = JSON.parse(localStorage.getItem('db_categories')) || [];
            allProducts = JSON.parse(localStorage.getItem('db_all_products')) || [];

            const name = localStorage.getItem('db_name') || "COKE-STORE";
            const logo = localStorage.getItem('db_logo') || "";
            const bg = localStorage.getItem('db_bg_color') || "#05070c";
            const footer = localStorage.getItem('db_footer_text') || "COKE-STORE";

            document.getElementById('shop-name').innerText = name;
            document.getElementById('web-title').innerText = name;

            const logoZone = document.getElementById('shop-logo-zone');
            if(logo) {
                logoZone.innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
            } else {
                logoZone.innerHTML = `<i class="fa-solid fa-fire text-lg"></i>`;
            }

            document.getElementById('shop-body').style.backgroundColor = bg;
            document.getElementById('user-menu-dropdown').style.backgroundColor = bg;
            document.getElementById('sub-modal-content-box').style.backgroundColor = bg;

            document.getElementById('shop-footer-text').innerText = footer.substring(0, 15);
        }

        function updateUserUIDisplay() {
            document.getElementById('user-display-name').innerText = userProfile.name;
            document.getElementById('user-display-money').innerText = userProfile.money.toFixed(2);
            document.getElementById('user-avatar').src = userProfile.avatar;
        }

        function toggleUserMenu() {
            document.getElementById('user-menu-dropdown').classList.toggle('hidden');
        }

        function openSubMenu(type) {
            document.getElementById('user-menu-dropdown').classList.add('hidden');
            const modal = document.getElementById('sub-menu-modal');
            const title = document.getElementById('sub-modal-title');
            const body = document.getElementById('sub-modal-body');
            modal.classList.remove('hidden');

            if(type === 'setting') {
                title.innerHTML = `<i class="fa-solid fa-user-gear text-cyan-400 mr-1"></i> การตั้งค่าบัญชีของคุณ`;
                body.innerHTML = `
                    <div class="space-y-3">
                        <div>
                            <label class="block text-[10px] text-slate-400 mb-1">เปลี่ยนชื่อผู้ใช้ (สูงสุด 30 ตัวอักษร)</label>
                            <input type="text" id="new-uname" maxlength="30" value="${userProfile.name}" class="w-full bg-slate-900 border border-slate-800 p-2 rounded-xl text-white text-xs focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-400 mb-1">ลิงก์รูปภาพโปรไฟล์ (Avatar URL)</label>
                            <input type="url" id="new-uavatar" value="${userProfile.avatar}" class="w-full bg-slate-900 border border-slate-800 p-2 rounded-xl text-white text-xs focus:outline-none">
                        </div>
                        <button onclick="saveUserProfileData()" class="w-full bg-white text-slate-950 py-2 rounded-xl font-bold cursor-pointer text-xs mt-2">บันทึกข้อมูลโปรไฟล์</button>
                    </div>
                `;
            } else if(type === 'refill') {
                title.innerHTML = `<i class="fa-solid fa-receipt text-amber-400 mr-1"></i> ประวัติการเติมเงินเงินอั่งเปา`;
                let listHtml = refillHistory.map(r => `
                    <div class="flex justify-between items-center p-2 bg-slate-900/40 border border-slate-900 rounded-xl">
                        <div><p class="text-white font-medium">✨ เติมเงินผ่านลิงก์อั่งเปา</p><span class="text-[9px] text-slate-500">${r.date}</span></div>
                        <div class="text-right"><p class="text-emerald-400 font-bold">+฿${r.amount}</p><span class="text-[9px] text-slate-400">${r.status}</span></div>
                    </div>
                `).join('');
                body.innerHTML = `<div class="space-y-2 max-h-[220px] overflow-y-auto">${listHtml || '<p class="text-slate-600 py-6 text-center">ไม่มีรายการบันทึกประวัติการเติมเงิน</p>'}</div>`;
            } else if(type === 'history') {
                title.innerHTML = `<i class="fa-solid fa-box-open text-emerald-400 mr-1"></i> ประวัติการสั่งซื้อสินค้าไอดี`;
                let listHtml = purchaseHistory.map(p => `
                    <div class="flex justify-between items-center p-2 bg-slate-900/40 border border-slate-900 rounded-xl">
                        <div><p class="text-white font-medium truncate max-w-[150px]">${p.item}</p><span class="text-[9px] text-slate-500">${p.date}</span></div>
                        <p class="text-slate-300 font-bold">฿${p.price.toFixed(2)}</p>
                    </div>
                `).join('');
                body.innerHTML = `<div class="space-y-2 max-h-[220px] overflow-y-auto">${listHtml || '<p class="text-slate-600 py-6 text-center">ไม่มีรายการบันทึกประวัติการสั่งซื้อ</p>'}</div>`;
            }
        }

        function saveUserProfileData() {
            const name = document.getElementById('new-uname').value.trim() || "User";
            const avatar = document.getElementById('new-uavatar').value.trim() || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150";
            
            userProfile.name = name.substring(0, 30);
            userProfile.avatar = avatar;
            
            localStorage.setItem('user_profile', JSON.stringify(userProfile));
            updateUserUIDisplay();
            closeSubMenu();
        }

        function closeSubMenu() { document.getElementById('sub-menu-modal').classList.add('hidden'); }

        function renderCategories() {
            loadShopSettings();
            const container = document.getElementById('categories-view');
            container.innerHTML = '';

            if (categories.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-xs text-center py-16">คลังสินค้าว่างเปล่า แอดมินยังไม่ได้ลงของไว้หลังบ้านครับ</p>`;
                return;
            }

            categories.forEach(cat => {
                const catProducts = allProducts.filter(p => p.catId === cat.id);
                const count = catProducts.length;
                let priceText = "0.00";
                if(count > 0) {
                    const prices = catProducts.map(p => p.price);
                    priceText = `${Math.min(...prices).toFixed(2)} - ${Math.max(...prices).toFixed(2)}`;
                }

                container.innerHTML += `
                    <div onclick="loadCategoryProducts('${cat.id}')" class="bg-slate-950/40 border border-slate-900 rounded-2xl p-3 flex flex-col justify-between gap-3 hover:border-slate-850 transition duration-200 cursor-pointer">
                        <div class="w-full aspect-[21/9] bg-slate-950 rounded-xl overflow-hidden border border-slate-900">
                            <img src="${cat.banner}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex justify-between items-end px-1">
                            <div><h3 class="text-sm font-bold text-white tracking-wide">${cat.name}</h3><p class="text-[11px] text-slate-500 mt-0.5">สินค้าทั้งหมด ${count} รายการ</p></div>
                            <div class="text-right"><span class="text-xs font-bold text-slate-400">฿${priceText}</span></div>
                        </div>
                    </div>
                `;
            });
        }

        function showCategoriesView() {
            document.getElementById('categories-view').classList.remove('hidden');
            document.getElementById('products-view').classList.add('hidden');
            document.getElementById('back-btn-container').classList.add('hidden');
            renderCategories();
        }

        function loadCategoryProducts(catId) {
            document.getElementById('categories-view').classList.add('hidden');
            document.getElementById('products-view').classList.remove('hidden');
            document.getElementById('back-btn-container').classList.remove('hidden');

            const grid = document.getElementById('products-view');
            grid.innerHTML = '';
            const list = allProducts.filter(p => p.catId === catId);
            
            if(list.length === 0) {
                grid.innerHTML = `<p class="text-slate-500 text-xs text-center py-12 col-span-2">สินค้าหมวดนี้หมดสต็อกชั่วคราวครับ</p>`;
                return;
            }

            list.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-slate-950/40 border border-slate-900 rounded-2xl p-3 flex flex-col justify-between">
                        <div class="space-y-2">
                            <div class="relative aspect-square w-full bg-slate-950 rounded-xl overflow-hidden border border-slate-850"><img src="${p.image}" class="w-full h-full object-cover"></div>
                            <div>
                                <h4 class="text-xs font-semibold text-slate-200 line-clamp-2 h-8 leading-tight">${p.name}</h4>
                                <div class="flex justify-between items-center mt-2"><span class="text-sm font-bold text-white">฿${p.price.toFixed(2)}</span><span class="text-[9px] text-emerald-400 bg-emerald-500/10 px-1.5 rounded">พร้อมขาย</span></div>
                            </div>
                        </div>
                        <div class="mt-3 pt-2 border-t border-slate-900/30">
                            <button onclick="openPurchaseModal(${p.id}, '${p.name}', ${p.price})" class="w-full bg-white text-slate-950 py-1.5 rounded-xl text-xs font-bold hover:bg-slate-200 transition cursor-pointer shadow">สั่งซื้อสินค้า</button>
                            <p class="text-[9px] text-slate-500 text-center mt-1.5">คงเหลือ ${p.stock} ชิ้น</p>
                        </div>
                    </div>
                `;
            });
        }

        function openPurchaseModal(id, name, price) {
            currentActiveProductId = id;
            document.getElementById('modal-summary').innerHTML = `
                <div class="flex justify-between"><span>สินค้า:</span><span class="text-white">${name}</span></div>
                <div class="flex justify-between font-bold mt-1"><span>ยอดเงินหักซอง:</span><span class="text-emerald-400">฿${price.toFixed(2)} บาท</span></div>
            `;
            document.getElementById('pay-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('pay-modal').classList.add('hidden'); }

        function executePurchase(e) {
            e.preventDefault();
            const link = document.getElementById('angpao-link').value.trim();
            if(!link.includes('gift.truemoney.com')) return alert('รูปแบบซองอั่งเปาไม่ถูกต้อง!');

            closeModal();
            const p = allProducts.find(item => item.id === currentActiveProductId);
            const foundAcc = p ? p.acc : "ID: error / PASS: unknown";

            if(p) {
                purchaseHistory.unshift({ date: new Date().toLocaleString('th-TH'), item: p.name, price: p.price });
                localStorage.setItem('user_purchase_log', JSON.stringify(purchaseHistory));
            }

            document.getElementById('delivery-box').innerHTML = `<b>ทำรายการตัดซองตรวจจับออโต้สำเร็จ!</b>\n\n🔑 <b>รหัสไอดีเกมของคุณ:</b>\n<span class="bg-slate-900 px-2 py-1 block mt-1 rounded text-amber-400 font-bold font-mono">${foundAcc}</span>`;
            document.getElementById('success-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
